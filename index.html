    <style>
        /* CSS KHUSUS BLOGGER OVERRIDE & ANIMATIONS */
        .blogger-top-navbar {
            display: none !important;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        .slide-up {
            animation: slideUp 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Toast Styles */
        #toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
        }

        .toast {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: opacity 0.5s;
        }

        .toast-success {
            background-color: #10b981;
        }

        .toast-error {
            background-color: #ef4444;
        }

        .toast-info {
            background-color: #3b82f6;
        }

        /* Mobile Scroll Hide */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Smooth Scrolling untuk Main Container */
        main {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body class="text-gray-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- INITIAL LOADING TEXT (WILL BE HIDDEN) -->
    <div id="init-loader"
        class="fixed inset-0 bg-white z-50 flex items-center justify-center font-bold text-2xl text-blue-600">
        Menyiapkan Lingkungan Aplikasi...
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <!-- TOP NAVIGATION (GLOBAL & DESKTOP) -->
    <header class="bg-white shadow-sm z-40 relative">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <a href="#home" class="flex items-center cursor-pointer">
                    <i class="fas fa-graduation-cap text-blue-600 text-3xl mr-2"></i>
                    <span class="font-bold text-xl tracking-tight text-gray-900">EduDigital</span>
                </a>

                <!-- Desktop Public Nav (Sembunyi saat Login) -->
                <nav id="desktop-public-nav" class="hidden md:flex space-x-8 items-center">
                    <a href="#home" class="text-gray-600 hover:text-blue-600 font-medium transition">Beranda</a>
                    <a href="#about" class="text-gray-600 hover:text-blue-600 font-medium transition">Tentang</a>
                    <a href="#pricing" class="text-gray-600 hover:text-blue-600 font-medium transition">Harga</a>
                    <a href="#articles" class="text-gray-600 hover:text-blue-600 font-medium transition">Artikel</a>
                    <a href="#faq" class="text-gray-600 hover:text-blue-600 font-medium transition">FAQ</a>
                    <button onclick="openLogin()"

                </nav>

                <!-- Tombol Login Mobile (Sembunyi saat Login) -->
                <div id="mobile-login-btn" class="md:hidden">
                    <button onclick="openLogin()"

                </div>

                <!-- User Profile / Logout (Muncul saat Login) -->
                <div id="user-menu" class="hidden items-center space-x-4">
                    <div class="text-sm text-right hidden md:block">
                        <p id="user-name-display" class="font-bold text-gray-900"></p>
                        <p id="user-role-display" class="text-gray-500 uppercase text-xs"></p>
                    </div>
                    <button onclick="handleLogout()"
                        class="bg-red-50 text-red-600 px-4 py-2 rounded-md font-medium hover:bg-red-100 transition text-sm">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN APP LAYOUT (FLEX) -->
    <div class="flex flex-1 overflow-hidden relative">

        <!-- SIDEBAR (DESKTOP DASHBOARD ONLY) -->
        <aside id="desktop-sidebar"
            class="hidden flex-col w-64 bg-white border-r border-gray-200 overflow-y-auto z-30 shadow-inner">
            <div class="p-4 border-b border-gray-100">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Menu Panel</h2>
            </div>
            <nav id="sidebar-nav-container" class="flex-1 p-4 space-y-1">
                <!-- Injected via JS -->
            </nav>
        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-1 overflow-y-auto bg-gray-50 relative flex flex-col">
            <div class="w-full flex-1" id="main-content">
                <!-- Content injected here -->
            </div>

            <!-- BLOGGER SPACER ANCHOR (WAJIB UNTUK MOBILE AGAR KONTEN TIDAK TERTUTUP BOTTOM NAV) -->

        <!-- Injected via JS -->
    </nav>

    <!-- LOGIN MODAL -->
    <div id="login-modal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden slide-up">
            <div class="p-6">

                    <h2 class="text-2xl font-bold text-gray-900">Masuk ke LMS</h2>
                    <button onclick="closeLogin()" class="text-gray-400 hover:text-gray-600"><i
                            class="fas fa-times text-xl"></i></button>
                </div>
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                        <input type="text" id="login-username" required

                        <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                        <input type="password" id="login-password" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-gray-50 transition">

                <h2 id="crud-modal-title" class="text-xl font-bold text-gray-900">Form Data</h2>

    <script>
        // ==========================================
        // CONFIGURATION & DATABASE CONNECTION
        // ==========================================
        const IS_PREVIEW = false;
        const GAS_URL = "https://script.google.com/macros/s/AKfycby0FHBt8HG0-Ny6KI-3szgejzuPiVZJOV9YzFcX-gzA4_hWNeo-oqhPlVsEUBycbqb5/exec";
        // ==========================================
        // ENKRIPSI STRING AMAN (MENCEGAH ERROR HTML INJECTION)
        // ==========================================
        const encodeBase64Safe = (str) => btoa(encodeURIComponent(str || ""));
        const decodeBase64Safe = (str) => decodeURIComponent(atob(str || ""));
        const generateId = () => 'ID_' + Math.random().toString(36).substr(2, 9);

        // ==========================================
        // APP STATE & DATA MOCKING
        // ==========================================
        let currentUser = null;
        let currentMenu = 'home';

        let appData = {
            courses: [], live: [], tools: [], templates: [], market: [], users: []
        };

        const dashboardMenus = [
            { id: 'dash_home', icon: 'fa-chart-pie', label: 'Dashboard' },
            { id: 'courses', icon: 'fa-video', label: 'Courses' },
            { id: 'live', icon: 'fa-satellite-dish', label: 'Live' },
            { id: 'tools', icon: 'fa-wrench', label: 'Tools' },
            { id: 'templates', icon: 'fa-file-code', label: 'Templates' },
            { id: 'market', icon: 'fa-store', label: 'Market' }
        ];

        const schema = {
            courses: [
                { key: 'title', label: 'Judul Course', type: 'text' },
                { key: 'description', label: 'Deskripsi', type: 'textarea' },
                { key: 'thumbnail_url', label: 'URL Thumbnail', type: 'text' },
                { key: 'content_url', label: 'URL Video/Konten', type: 'text' },
            ],
            live: [
                { key: 'topic', label: 'Topik Live', type: 'text' },
                { key: 'date_time', label: 'Waktu (Misal: 10 Okt, 19:00)', type: 'text' },
                { key: 'meeting_link', label: 'Link Zoom/GMeet', type: 'text' },
            ],
            tools: [
                { key: 'tool_name', label: 'Nama Tool', type: 'text' },
                { key: 'description', label: 'Deskripsi Singkat', type: 'textarea' },
                { key: 'access_link', label: 'Link Akses', type: 'text' },
                { key: 'icon_url', label: 'URL Icon Image', type: 'text' },
            ],
            templates: [
                { key: 'template_name', label: 'Nama Template', type: 'text' },
                { key: 'category', label: 'Kategori', type: 'text' },
                { key: 'download_link', label: 'Link Download', type: 'text' },
                { key: 'preview_img', label: 'URL Gambar Preview', type: 'text' },
            ],
            market: [
                { key: 'product_name', label: 'Nama Produk', type: 'text' },
                { key: 'price', label: 'Harga (Rp)', type: 'text' },
                { key: 'description', label: 'Deskripsi', type: 'textarea' },
                { key: 'buy_link', label: 'Link Checkout', type: 'text' },
                { key: 'image_url', label: 'URL Gambar Produk', type: 'text' },
            ]
        };

        window.onload = () => {
            document.getElementById('year').innerText = new Date().getFullYear();

            if (IS_PREVIEW) {
                appData.users = [
                    { id: '1', username: 'admin', password: '123', role: 'admin', name: 'Super Admin' },
                    { id: '2', username: 'user', password: '123', role: 'peserta', name: 'Peserta Aktif' }
                ];
                appData.courses = [{ id: 'c1', title: 'Mastering Apps Script', description: 'Belajar membuat backend tanpa server.', thumbnail_url: 'https://placehold.co/600x400/2563eb/white?text=Apps+Script', content_url: '#' }];
                appData.live = [{ id: 'l1', topic: 'Q&A Web App Development', date_time: 'Besok, 19:30 WIB', meeting_link: '#' }];
                appData.tools = [{ id: 't1', tool_name: 'CSS Generator', description: 'Buat bayangan kotak dengan mudah', access_link: '#', icon_url: 'https://placehold.co/100/10b981/white?text=CSS' }];

                const localMock = localStorage.getItem('mockAppData');
                if (localMock) appData = JSON.parse(localMock);
            }

            const savedSession = localStorage.getItem('userSession');
            if (savedSession) {
                currentUser = JSON.parse(savedSession);
                currentMenu = 'dash_home';
            } else {
                currentUser = null;
                currentMenu = 'home';
            }

            if (!IS_PREVIEW) fetchAllDataFromServer();

            setTimeout(() => {
                document.getElementById('init-loader').classList.add('hidden');
                renderApp();
            }, 300);
        };

        function renderApp() {
            const isPublic = !currentUser;

            const publicNav = document.getElementById('desktop-public-nav');
            const mobileLoginBtn = document.getElementById('mobile-login-btn');
            const userMenu = document.getElementById('user-menu');
            const sidebar = document.getElementById('desktop-sidebar');
            const bottomNav = document.getElementById('mobile-bottom-nav');
            const mobileSpacer = document.getElementById('mobile-spacer');
            const mainContent = document.getElementById('main-content');

            if (isPublic) {
                publicNav.className = "hidden md:flex space-x-8 items-center";
                mobileLoginBtn.className = "md:hidden block";
                userMenu.className = "hidden";
                sidebar.className = "hidden";
                bottomNav.className = "hidden";
                mobileSpacer.className = "hidden";
                mainContent.className = "w-full flex-1"; // Full width 100% untuk landing page

                if (currentMenu.startsWith('dash_') || ['courses', 'live', 'tools', 'templates', 'market'].includes(currentMenu)) {
                    currentMenu = 'home';
                }
            } else {
                publicNav.className = "hidden";
                mobileLoginBtn.className = "hidden";
                userMenu.className = "flex items-center space-x-4";
                sidebar.className = "hidden md:flex flex-col w-64 bg-white border-r border-gray-200 overflow-y-auto z-30 shadow-inner";
                bottomNav.className = "flex md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-50 justify-around items-center h-16 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]";
                mobileSpacer.className = "pb-24 block clear-both content-none md:hidden";
                mainContent.className = "max-w-7xl mx-auto p-4 md:p-8 w-full flex-1"; // Padded and constrained untuk dashboard
            }

            if (currentUser) {
                document.getElementById('user-name-display').innerText = currentUser.name;
                document.getElementById('user-role-display').innerText = currentUser.role;
                renderNavigationLinks();
                renderDashboardContent();
            } else {
                renderPublicContent();
            }
        }

        function renderNavigationLinks() {
            const sideNav = document.getElementById('sidebar-nav-container');
            const bottomNav = document.getElementById('mobile-bottom-nav');
            sideNav.innerHTML = ''; bottomNav.innerHTML = '';

            dashboardMenus.forEach(menu => {
                const isActive = currentMenu === menu.id;

                const sBtn = document.createElement('button');
                sBtn.className = `w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-colors ${isActive ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900'}`;
                sBtn.innerHTML = `<i class="fas ${menu.icon} w-6 text-lg ${isActive ? 'text-blue-600' : 'text-gray-400'}"></i> <span>${menu.label}</span>`;
                sBtn.onclick = () => { currentMenu = menu.id; renderApp(); };
                sideNav.appendChild(sBtn);

                const bBtn = document.createElement('button');
                bBtn.className = `flex flex-col items-center justify-center w-full h-full text-xs transition ${isActive ? 'text-blue-600' : 'text-gray-500'}`;
                bBtn.innerHTML = `<i class="fas ${menu.icon} text-xl mb-1"></i> <span class="truncate w-full text-center px-1" style="font-size: 0.65rem;">${menu.label}</span>`;
                bBtn.onclick = () => { currentMenu = menu.id; renderApp(); };
                bottomNav.appendChild(bBtn);
            });
        }

        function navigate(page) {
            currentMenu = page;
            renderApp();
        }

                        <!-- Decorative Background Blurs -->
                        <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
                            <div class="absolute -top-32 -right-32 w-[500px] h-[500px] bg-blue-300/30 rounded-full filter blur-[100px] opacity-70"></div>

                        </div>

                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                            <div class="grid lg:grid-cols-2 gap-16 lg:gap-8 items-center">
                                <!-- KOLOM KIRI: TEKS & TOMBOL -->
                                <div class="text-center lg:text-left pt-8 lg:pt-0">
                                    <!-- Badge -->
                                    <div class="inline-flex items-center px-5 py-2 rounded-full bg-blue-600 text-white font-bold text-xs tracking-wider mb-8 shadow-md shadow-blue-500/30 uppercase">
                                        LMS Generasi Baru
                                    </div>
                                    
                                    <!-- Heading -->
                                    <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-gray-900 mb-6 tracking-tight leading-[1.15]">
                                        Kuasai <span class="text-blue-600">Web App</span> & <br class="hidden sm:block"/>
                                        <span class="text-blue-600">Google Sheets</span> Database
                                    </h1>
                                    
                                    <!-- Subheading -->
                                    <p class="text-lg md:text-xl text-gray-600 mb-10 max-w-xl mx-auto lg:mx-0 leading-relaxed font-medium">
                                        Platform pembelajaran terlengkap untuk membangun sistem informasi modern, cepat, dan tanpa biaya server bulanan.
                                    </p>
                                    
                                    <!-- Buttons -->
                                    <div class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start mb-12">

                                                <i class="fas fa-code"></i>

                                            <h4 class="font-bold text-sm text-gray-900 mb-1">Web App Modern</h4>
                                            <p class="text-xs text-gray-500 font-medium">HTML, CSS, JS</p>
                                        </div>
                                        <div class="flex flex-col items-center lg:items-start text-center lg:text-left">

                                            <h4 class="font-bold text-sm text-gray-900 mb-1">Google Sheets</h4>

                                        </div>
                                        <div class="flex flex-col items-center lg:items-start text-center lg:text-left">
                                            <div class="w-14 h-14 bg-white rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center text-amber-500 text-2xl mb-4 transform hover:scale-110 transition duration-300">

        let currentEditingEntity = null;
        let currentEditingId = null;

        function openCrudModal(entity, encodedData = null) {
            currentEditingEntity = entity;
            const titleEl = document.getElementById('crud-modal-title');
            const fieldsContainer = document.getElementById('crud-form-fields');
            fieldsContainer.innerHTML = '';

            let data = {};
            if (encodedData) {
                data = JSON.parse(decodeBase64Safe(encodedData));
                currentEditingId = data.id;
                titleEl.innerText = `Edit Data ${entity.toUpperCase()}`;
            } else {
                currentEditingId = null;
                titleEl.innerText = `Tambah Data ${entity.toUpperCase()}`;
            }

            const fields = schema[entity];
            fields.forEach(f => {
                const val = data[f.key] || '';
                let inputHtml = '';
                if (f.type === 'textarea') {
                    inputHtml = `<textarea id="field_${f.key}" rows="3" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500 bg-gray-50">${val}</textarea>`;
                } else {
                    inputHtml = `<input type="${f.type}" id="field_${f.key}" value="${val}" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500 bg-gray-50">`;
                }
                fieldsContainer.innerHTML += `
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-1">${f.label}</label>
                        ${inputHtml}
                    </div>
                `;
            });

            document.getElementById('crud-modal').classList.remove('hidden');
        }

        function closeCrudModal() {
            document.getElementById('crud-modal').classList.add('hidden');
        }

        async function submitCrudForm() {
            const entity = currentEditingEntity;
            const fields = schema[entity];
            const payload = { id: currentEditingId || generateId() };

            fields.forEach(f => {
                payload[f.key] = document.getElementById(`field_${f.key}`).value;
            });

            closeCrudModal();
            const action = currentEditingId ? 'update' : 'create';
            await performDataOperation(entity, action, payload);
        }

        async function deleteData(entity, id) {
            if (!confirm('Yakin ingin menghapus data ini?')) return;
            await performDataOperation(entity, 'delete', { id: id });
        }

        async function performDataOperation(entity, action, payload) {
            const backupList = JSON.parse(JSON.stringify(appData[entity]));

            if (action === 'create') {
                appData[entity].unshift(payload);
            } else if (action === 'update') {
                const idx = appData[entity].findIndex(x => x.id === payload.id);
                if (idx > -1) appData[entity][idx] = payload;
            } else if (action === 'delete') {
                appData[entity] = appData[entity].filter(x => x.id !== payload.id);
            }

            // Langsung update layar agar pengguna melihat perubahan (Optimistic UI)
            renderDashboardContent();

            showToast("Perubahan diterapkan seketika!", "success");

            if (IS_PREVIEW) {
                console.log(`[Preview Mode] ${action} on ${entity}:`, payload);
                localStorage.setItem('mockAppData', JSON.stringify(appData));
            } else {
                try {
                    const reqBody = {
                        action: action,
                        sheetName: entity.charAt(0).toUpperCase() + entity.slice(1),
                        data: payload
                    };

                    const res = await fetch(GAS_URL, {
                        method: "POST",
                        body: JSON.stringify(reqBody)
                    });

                    if (!res.ok) throw new Error("HTTP error " + res.status);

                    const resJson = await res.json();
                    if (resJson.status !== 'success') throw new Error(resJson.message);
                    console.log("Background sync success!");

                } catch (err) {
                    console.warn("Background Sync Gagal:", err.message);
                    showToast("Koneksi gagal! Rollback data...", "error");
                    appData[entity] = backupList;
                    renderDashboardContent();
                }
            }
        }

        async function fetchAllDataFromServer() {
            try {
                const res = await fetch(GAS_URL + "?action=readAll");
                if (!res.ok) throw new Error("HTTP error " + res.status);

                const data = await res.json();
                if (data.status === 'success') {
                    appData = { ...appData, ...data.data };
                    // PERBAIKAN: Selalu renderApp() setelah fetch selesai, entah itu public/dashboard
                    renderApp();
                } else {
                    throw new Error(data.message || "Server tidak mengembalikan status success");
                }
            } catch (e) {
                console.warn("Gagal load data awal dari server:", e.message);
                showToast("Gagal terhubung ke Database. Menampilkan mode simulasi...", "error");

                // FALLBACK KE MOCK DATA AGAR UI TETAP JALAN MESKIPUN URL GAS ERROR / BELUM DI-DEPLOY
                if (appData.courses.length === 0) {

            btn.innerText = "Memeriksa..."; btn.disabled = true;

            if (IS_PREVIEW) {
                setTimeout(() => {
                    const user = appData.users.find(x => x.username === u && x.password === p);
                    if (user) processLoginSuccess(user, btn, originalBtnText);
                    else processLoginFail(btn, originalBtnText);
                }, 500);
            } else {
                try {
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'login', username: u, password: p })
                    });

                    if (!res.ok) throw new Error("HTTP error " + res.status);

                    const resJson = await res.json();
                    if (resJson.status === 'success' && resJson.user) {
                        processLoginSuccess(resJson.user, btn, originalBtnText);
                    } else {
                        processLoginFail(btn, originalBtnText, "Kredensial salah!");
                    }
                } catch (err) {
                    console.warn("Login fetch error:", err.message);

                    // FALLBACK UNTUK LOGIN KE MODE SIMULASI JIKA SERVER ERROR
                    const fallbackUser = appData.users.find(x => x.username === u && x.password === p);
                    if (fallbackUser) {
                        showToast("Koneksi server gagal. Menggunakan login mode simulasi...", "info");
                        processLoginSuccess(fallbackUser, btn, originalBtnText);
                    } else {
                        processLoginFail(btn, originalBtnText, "Koneksi server gagal. Periksa URL GAS Anda.");
                    }
                }
            }
        }

        function processLoginSuccess(userData, btn, text) {
            currentUser = userData;
            localStorage.setItem('userSession', JSON.stringify(currentUser));
            currentMenu = 'dash_home';
            closeLogin();
            showToast(`Selamat datang, ${currentUser.name}!`, "success");
            btn.innerText = text; btn.disabled = false;
            document.getElementById('login-form').reset();
            renderApp();
        }

        function processLoginFail(btn, text, msg = "Username/Password salah!") {
            showToast(msg, "error");
            btn.innerText = text; btn.disabled = false;
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('userSession');
            currentMenu = 'home';
            showToast("Berhasil logout", "info");
            renderApp();
        }

        function showToast(msg, type = "info") {
            const tc = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast toast-${type} fade-in`;
            t.innerText = msg;
            tc.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                setTimeout(() => t.remove(), 500);
            }, 3000);
        }

    </script>
</body>

</html>
